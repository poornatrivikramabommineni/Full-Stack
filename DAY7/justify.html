<!doctype html>
<html lang="en">
  <head>
    <style>
      .parent {
        background-color: black;
        height: 500px;
        width: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap:wrap;
      }
      div {
        font-size: 100px;
        height: 100px;
        width: 100px;
      }
      .child1 {
        order:3;
        background-color: aqua;
      }
      .child2 {
        order:1;
        background-color: rgb(255, 255, 255);
      }
      .child3 {
        align-self: flex-end;
        order:2;
        background-color: rgb(255, 0, 191);
      }
      .child4 {
        order:1;
        background-color: rgb(255, 255, 255);
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <div class="parent">
      <div class="child1">1</div>
      <div class="child2">2</div>
      <div class="child3">3</div>
      <div class="child4">4</div>
    </div>
  </body>
</html>
