<!doctype html>
<html lang="en">
  <head>
    <title>iframe</title>
  </head>
  <body>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/62bIsvRcPv0?si=IDNRz99A3uAVkIIv"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <iframe src="select.html" frameborder="1" width="300" height="300"></iframe>
  </body>
</html>
